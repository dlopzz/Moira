<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="15">
<title>Moira — Mantenimiento</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 1.5rem;
  }
  .card {
    text-align: center;
    max-width: 420px;
  }
  .card img {
    width: 220px;
    max-width: 70vw;
    height: auto;
    margin-bottom: 2rem;
  }
  .card h1 {
    color: #325b0e;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin: 0 0 0.6rem;
  }
  .card p {
    color: #878787;
    font-size: 0.9rem;
    line-height: 1.6;
    margin: 0;
  }
</style>
</head>
<body>
  <div class="card">
    <img src="/logo.jpg" alt="Moira">
    <h1>Estamos actualizando el sitio</h1>
    <p>Volvemos en breve. Gracias por tu paciencia.</p>
  </div>

</html>
